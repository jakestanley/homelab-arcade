<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Server</title>
    <link rel="stylesheet" href="/shared.css" />
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <div class="subtitle">Example Game</div>
          <h1>Dummy Server</h1>
        </div>
        <div class="status-pill starting">
          <span>Starting</span>
        </div>
      </header>

      <section class="grid">
        <div class="card">
          <h2>Server Status</h2>
          <div class="status-grid">
            <div class="status-item">
              <span>Mode</span>
              Test Arena
            </div>
            <div class="status-item">
              <span>Map</span>
              dummy_map
            </div>
            <div class="status-item">
              <span>Players</span>
              0 / 16
            </div>
          </div>
          <div class="controls">
            <button class="accent" disabled>Start</button>
            <button class="secondary" disabled>Stop</button>
          </div>
          <p class="pending">Placeholder UI using shared styles.</p>
        </div>

        <div class="card">
          <h2>Notes</h2>
          <p class="pending">
            This is a dummy game server page to demonstrate shared UI components and layout.
          </p>
          <div class="controls">
            <a class="link-button" id="portal-link" href="#">Back to portal</a>
          </div>
        </div>
      </section>
    </div>
    <script>
      const portalLink = document.getElementById("portal-link");
      const host = window.location.hostname;

      const buildUrl = (port) => {
        const portValue = Number(port) || 80;
        const portSuffix = portValue !== 80 ? `:${portValue}` : "";
        return `http://${host}${portSuffix}/`;
      };

      fetch("/api/portal")
        .then((res) => (res.ok ? res.json() : Promise.reject()))
        .then((data) => {
          portalLink.href = buildUrl(data.port);
        })
        .catch(() => {
          portalLink.href = buildUrl(80);
        });
    </script>
  </body>
</html>
