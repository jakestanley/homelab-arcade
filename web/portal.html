<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Server Portal</title>
    <link rel="stylesheet" href="/shared.css" />
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <div class="subtitle">Server Index</div>
          <h1>Game Server Portal</h1>
        </div>
      </header>

      <section class="grid" id="variant-grid"></section>
    </div>
    <script>
      const grid = document.getElementById("variant-grid");
      const statusLabels = {
        live: "Live",
        starting: "Starting",
        offline: "Offline",
      };

      const resolveHost = async () => {
        if (window.location.hostname) {
          return window.location.hostname;
        }
        try {
          const res = await fetch("/api/host");
          if (!res.ok) return "";
          const data = await res.json();
          return data.host || "";
        } catch (err) {
          return "";
        }
      };

      const buildUrl = (host, port, path) => {
        const cleanPath = path && path.startsWith("/") ? path : `/${path || ""}`;
        const portSuffix = port && Number(port) !== 80 ? `:${port}` : "";
        return `http://${host}${portSuffix}${cleanPath}`;
      };

      const renderVariants = (variants, host) => {
        grid.innerHTML = "";
        if (!variants.length) {
          const card = document.createElement("div");
          card.className = "card";
          const message = document.createElement("p");
          message.className = "pending";
          message.textContent = "No variants configured.";
          card.appendChild(message);
          grid.appendChild(card);
          return;
        }

        variants.forEach((variant) => {
          const card = document.createElement("div");
          card.className = "card";

          const header = document.createElement("div");
          header.className = "card-header";

          const title = document.createElement("h2");
          title.textContent = variant.display_name || variant.id;

          const status = document.createElement("span");
          const state = variant.status?.state || "starting";
          status.className = `status-pill ${state}`;
          status.textContent = statusLabels[state] || "Unknown";

          header.appendChild(title);
          header.appendChild(status);

          const description = document.createElement("p");
          description.className = "pending";
          description.textContent = variant.description || "Game UI";

          const controls = document.createElement("div");
          controls.className = "controls";

          const link = document.createElement("a");
          link.className = "link-button";
          link.href = buildUrl(host, variant.port, variant.ui_path || "/");
          link.textContent = "Open UI";

          controls.appendChild(link);
          card.appendChild(header);
          card.appendChild(description);
          card.appendChild(controls);
          grid.appendChild(card);
        });
      };

      let cachedHost = "";

      const refreshVariants = async () => {
        if (!cachedHost) {
          cachedHost = await resolveHost();
        }
        if (!cachedHost) {
          return;
        }
        try {
          const res = await fetch("/api/variants");
          if (!res.ok) return;
          const variants = await res.json();
          renderVariants(Array.isArray(variants) ? variants : [], cachedHost);
        } catch (err) {
          return;
        }
      };

      refreshVariants();
      setInterval(refreshVariants, 4000);
    </script>
  </body>
</html>
